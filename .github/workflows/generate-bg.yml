name: Async Background Generator
on:
  repository_dispatch:
    types: [generate_bg]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate Image
        env:
          IMAGE_PROMPT: ${{ github.event.client_payload.prompt }}
        run: node scripts/generate_image.js
      - name: Push to Repository
        run: |
          git config --global user.name "AI-Asset-Bot"
          git config --global user.email "bot@pantech.com"
          git add assets/*.png
          git commit -m "New Asset: ${{ github.event.client_payload.prompt }}" || exit 0
          git push
