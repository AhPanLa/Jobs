name: Async Background Generator
on:
  repository_dispatch:
    types: [generate_bg]

# 关键修复：显式授予写权限，允许 Action 把图片 Push 回仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run Drawing Script
        env:
          IMAGE_PROMPT: ${{ github.event.client_payload.prompt }}
        run: node scripts/generate_image.js

      - name: Commit & Push to Asset Storage
        run: |
          git config --global user.name "AI-Asset-Bot"
          git config --global user.email "bot@pantech.com"
          git add assets/*.png
          git commit -m "Auto-generated Flux background" || exit 0
          # 注意：这里我们使用默认生成的 GITHUB_TOKEN
          git push
