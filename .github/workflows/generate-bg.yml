name: Async Background Generator
on:
  repository_dispatch:
    types: [generate_bg]

jobs:
  build:
    # 关键修改：强制使用 22.04 版本，避免 Ubuntu 24.04 的包名兼容性坑
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Puppeteer and Linux Dependencies
        run: |
          npm install puppeteer
          sudo apt-get update
          # 这些是在 Ubuntu 22.04 下跑 Chrome 的标准必装依赖
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libxkbcommon-x11-0 \
            libgtk-3-0 \
            libasound2 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libcups2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2

      - name: Run Drawing Script
        env:
          IMAGE_PROMPT: ${{ github.event.client_payload.prompt }}
        run: node scripts/generate_image.js

      - name: Commit & Push to Asset Storage
        run: |
          git config --global user.name "AI-Asset-Bot"
          git config --global user.email "bot@pantech.com"
          git add assets/*.png
          git commit -m "Auto-generated new background" || exit 0
          git push
