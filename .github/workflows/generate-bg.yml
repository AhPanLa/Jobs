name: Async Background Generator

on:
  repository_dispatch:
    types: [generate_bg] # 监听 n8n 的触发信号

# 关键：授予 Action 对仓库的写入权限，解决 403 报错
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Image
        env:
          # 将 n8n 传来的 prompt 注入环境变量
          IMAGE_PROMPT: ${{ github.event.client_payload.prompt }}
        run: node scripts/generate_image.js

      - name: Commit and Push to Assets
        run: |
          git config --global user.name "AI-Asset-Bot"
          git config --global user.email "bot@pantech.com"
          git add assets/*.png
          # 如果没有变化则跳过，防止报错
          git commit -m "Auto-generated Flux background: ${{ github.event.client_payload.prompt }}" || exit 0
          git push
